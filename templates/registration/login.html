{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block description %}Sign in to your account{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-12">
    <div class="bg-white rounded-lg shadow p-8">
        <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">Sign In</h2>
        <form method="post">{% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Username</label>
                    <input type="text" name="username" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" name="password" class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2" required>
                </div>
            </div>
            <button type="submit" class="mt-6 w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
